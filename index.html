<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Menu</title>

<style>
body{
    margin:0;
    background:#f2f2f2;
    font-family:Arial,sans-serif;
}

.menu{
    display:flex;
    justify-content:space-around;
    padding:15px 5px;
    margin-top:20px;
}

.btn{
    width:18%;
    padding:12px 5px;
    border:none;
    border-radius:20px;
    color:white;
    font-size:12px;
    font-weight:bold;
    cursor:pointer;
}

.jodi{background:#6c5ce7;}
.haruf{background:#00b894;}
.crossing{background:#0984e3;}
.copy{background:#e17055;}
.type{background:#111;}
</style>
</head>

<body>

<div class="menu">

<button class="btn jodi" onclick="location.href='jodi.html'">
JODI
</button>

<button class="btn haruf" onclick="location.href='haruf.html'">
HARUF
</button>

<button class="btn crossing" onclick="location.href='crossing.html'">
CROSSING
</button>

<button class="btn copy" onclick="location.href='copy.html'">
COPY
</button>

<button class="btn type" onclick="location.href='play.html'">
TYPE/IMAGE
</button>

</div>

</body>
</html>
